<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' file:; script-src 'self' file: 'unsafe-inline'; style-src 'self' file: 'unsafe-inline'; img-src 'self' file: data: https://*.tile.openstreetmap.org;">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Terrena Tracker</title>
  <link rel="stylesheet" href="./styles.css">
  <link rel="stylesheet" href="../node_modules/leaflet/dist/leaflet.css">
  <script type="importmap">
    {
      "imports": {
        "leaflet": "../node_modules/leaflet/dist/leaflet-src.esm.js"
      }
    }
  </script>
</head>
<body>
  <header class="banner">
    <div class="titulo">
      <img src="../assets/logo.png" alt="Logo" class="logo">
      <h1 class="titulo-texto">Terrena Tracker</h1>
    </div>
    <div class="serial-port-selector">
      <select id="serialPortSelect">
        <option value="">Seleccionar Puerto Serial</option>
        <option value="simulation">Modo Simulación</option>
      </select>
    </div>
  </header>

  <div class="map-container">
    <div id="map"></div>
    <div class="map-info-panel">
      <div class="map-info-row">
        <span class="map-info-label">Cohete:</span>
        <span class="map-info-value" id="mapRocketCoords">--</span>
      </div>
      <div class="map-info-row">
        <span class="map-info-label">Altitud:</span>
        <span class="map-info-value" id="mapRocketAlt">--</span>
      </div>
      <div class="map-info-row">
        <span class="map-info-label">Estado:</span>
        <span class="map-info-value" id="mapFlightStatus">--</span>
      </div>
      <div class="map-info-row">
        <span class="map-info-label">Alarma:</span>
        <span class="map-info-value" id="mapAlarm">--</span>
      </div>
      <div class="map-info-row">
        <span class="map-info-label">Estación:</span>
        <span class="map-info-value" id="mapGroundCoords">--</span>
      </div>
    </div>
  </div>

  <script type="module" src="./app.mjs"></script>
</body>
</html>
