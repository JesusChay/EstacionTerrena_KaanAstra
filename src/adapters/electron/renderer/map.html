<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self' file:;
    script-src 'self' file: 'unsafe-inline';
    style-src 'self' file: 'unsafe-inline';
    img-src 'self' file: data: https://*.tile.openstreetmap.org;
  ">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mapa - KA'AN ASTRA</title>
  <link rel="stylesheet" href="../../../../node_modules/leaflet/dist/leaflet.css" />
  <link rel="stylesheet" href="./map.css" />
  <script type="importmap">
    {
      "imports": {
        "leaflet": "../../../../node_modules/leaflet/dist/leaflet-src.esm.js"
      }
    }
  </script>
</head>
<body>
  <header class="banner">
    <div class="titulo">
      <img src="../../../../assets/logo.png" alt="Logo" class="logo">
      <h1 class="titulo-texto">KA'AN ASTRA</h1>
    </div>
  </header>

  <main class="map-layout">
    <aside class="prediction-panel" aria-live="polite">
      <div class="prediction-panel-header">
        <div>
          <p class="prediction-overline">Prediccion en vivo</p>
          <h2>Zona estimada de caida</h2>
        </div>
        <span id="predictionPhaseBadge" class="prediction-phase-badge prediction-phase-waiting">Esperando</span>
      </div>

      <div class="prediction-metrics-grid">
        <article class="prediction-metric-card">
          <span class="prediction-metric-label">Estado</span>
          <strong id="predictionStatusValue">Sin datos</strong>
        </article>
        <article class="prediction-metric-card">
          <span class="prediction-metric-label">ETA</span>
          <strong id="predictionEtaValue">--</strong>
        </article>
        <article class="prediction-metric-card">
          <span class="prediction-metric-label">Confianza</span>
          <strong id="predictionConfidenceValue">--</strong>
        </article>
        <article class="prediction-metric-card">
          <span class="prediction-metric-label">Radio</span>
          <strong id="predictionRadiusValue">--</strong>
        </article>
      </div>

      <div class="prediction-detail-stack">
        <div class="prediction-detail-row">
          <span class="prediction-detail-label">Impacto</span>
          <span id="predictionLandingValue" class="prediction-detail-value">Sin coordenadas</span>
        </div>
      </div>

      <div class="prediction-legend">
        <div class="prediction-legend-item">
          <span class="legend-swatch legend-swatch-real"></span>
          <span>Real</span>
        </div>
        <div class="prediction-legend-item">
          <span class="legend-swatch legend-swatch-estimated"></span>
          <span>Est.</span>
        </div>
        <div class="prediction-legend-item">
          <span class="legend-swatch legend-swatch-impact"></span>
          <span>Caida</span>
        </div>
      </div>
    </aside>
    <div id="map"></div>
  </main>

  <script type="module" src="./map.mjs"></script>
</body>
</html>
